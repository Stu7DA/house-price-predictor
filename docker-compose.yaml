services:
  fastapi:
    image: sunny250707/fastapi:dev
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - 8001:8000
    
  streamlit:
    image: sunny250707/streamlit:dev
    build:
      context: ./streamlit_app
      dockerfile: Dockerfile
    ports:
      - 8010:8501
    environment:
      API_URL: http://fastapi:8000
